          - generic [ref=e178]:
            - paragraph [ref=e179]: Practical implication
            - paragraph [ref=e180]: The statutory deadlines that currently apply to social landlords (10 working days to investigate, 3 working days for written findings) do not yet apply to the private rented sector. However, the standard the PRS Landlord Ombudsman is likely to apply when it commences, and the Pre-Action Protocol requirements that apply today, increasingly mirror them. Evidence collected now protects you against claims under Section 11, the Homes Act, and HHSRS — the same evidence will satisfy the Ombudsman once it is in place.
        - generic [ref=e181]:
          - generic [ref=e182]:
            - generic [ref=e183]: R4 — Where Maple Diagnostics fits
            - heading "Court-ready evidence for Section 11, HHSRS, and the Ombudsman — from day one." [level=2] [ref=e184]
          - generic [ref=e185]:
            - paragraph [ref=e186]: When a tenant complains about damp or mould, your liability under Section 11 and the Homes Act is assessed against what a reasonable landlord with the relevant knowledge would have done. A 14-day sensor deployment produces continuous environmental data — humidity, temperature, surface dew-point — that documents the property's condition objectively, without relying on a single inspection that may not reflect a chronic problem.
            - paragraph [ref=e187]: The kit is dispatched the same day, self-installed by the tenant or landlord, and returned in a prepaid envelope. The resulting report is formatted for court and Ombudsman submissions, includes an outdoor baseline comparison, and carries a timestamped audit trail.

                - generic [ref=e111]: In force
              - generic [ref=e112]:
                - paragraph [ref=e113]: "Section 21 abolished: ASTs converted to Assured Tenancies."
                - paragraph [ref=e114]:
                  - text: You can no longer serve a Section 21 no-fault notice. No-fault notices served on or before 30 April 2026 remain valid for a transitional period, with court proceedings required by 31 July 2026. Periodic tenancies are now ended on the strengthened Section 8 grounds.
                  - link "[23]" [ref=e115] [cursor=pointer]:
                    - /url: /references#ref-23
                    - superscript [ref=e116]: "[23]"
                - paragraph [ref=e117]:
                  - strong [ref=e118]: This matters for damp cases
                  - text: because a tenant raising a disrepair complaint can no longer be removed through Section 21 — the evidential burden on you to address the complaint is higher.
            - generic [ref=e119]:

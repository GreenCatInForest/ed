                - generic [ref=e124]: In force
              - generic [ref=e125]:
                - paragraph [ref=e126]: Rent increases limited to once per 12 months, with 2 months' written notice.
                - paragraph [ref=e127]:
                  - text: Under Section 13. Tenants can challenge a rent increase at the First-tier Tribunal. Rent increases imposed in response to disrepair complaints are likely to attract particular scrutiny.
                  - link "[24]" [ref=e128] [cursor=pointer]:
                    - /url: /references#ref-24
                    - superscript [ref=e129]: "[24]"

                - paragraph [ref=e152]: PRS Landlord Ombudsman becomes mandatory.
                - paragraph [ref=e153]:
                  - text: The Private Rented Sector Landlord Ombudsman, established under Chapter 2 Part 1 of the Renters' Rights Act, is currently being set up by MHCLG. Once operating, all private landlords must join. Tenants will be able to escalate unresolved complaints — including damp and mould — to the Ombudsman, which will have powers to order remedial works, apologies, and compensation.
                  - link "[26]" [ref=e154] [cursor=pointer]:

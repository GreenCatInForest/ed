      - generic [ref=e42]: A guide for private landlords · current as of 21 May 2026
      - heading "A tenant has complained about damp or mould. What do you actually have to do?" [level=1] [ref=e43]
      - paragraph [ref=e44]: The Renters' Rights Act 2025's first phase has been in force since 1 May 2026. Section 21 evictions are abolished and the new periodic tenancy regime applies, though the PRS Landlord Ombudsman is not yet in force. This page sets out your statutory duties as they stand today, the access rights and evidence rules that govern damp and mould complaints, and what's still pending.
      - paragraph [ref=e45]: "Last reviewed: 21 May 2026"

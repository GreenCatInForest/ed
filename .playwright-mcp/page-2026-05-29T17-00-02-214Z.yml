        - heading "What landlords get wrong." [level=2] [ref=e165]
      - generic [ref=e166]:
        - generic [ref=e167]:
          - paragraph [ref=e168]: "\"What if my tenant won't let me install sensors?\""
          - paragraph [ref=e169]: Section 11(6) of the Landlord and Tenant Act 1985 gives you a right of entry to view the state and condition of the property with at least 24 hours' written notice. Our welcome pack includes a template Section 11 notice letter that meets statutory requirements.
        - generic [ref=e170]:
          - paragraph [ref=e171]: "\"The tenant is causing it themselves — I shouldn't need evidence.\""
          - paragraph [ref=e172]: Courts and local authorities won't take the word for it. Without sensor data showing condensation issues (poor ventilation, cooking, drying laundry), you can't distinguish structural damp from tenant behaviour. The assumption goes against you.
        - generic [ref=e173]:
          - paragraph [ref=e174]: "\"I'll deal with it if they actually make a complaint.\""
          - paragraph [ref=e175]: By the time a Shelter referral or solicitor letter arrives, you're already in reactive mode. Pre-emptive monitoring is admissible evidence and demonstrates due diligence.
        - generic [ref=e176]:
          - paragraph [ref=e177]: "\"A surveyor's inspection should be enough.\""
          - paragraph [ref=e178]: A one-day visit creates a snapshot. Damp and mould is seasonal and behavioural — a 10 or 14-day continuous record shows patterns a single inspection cannot.
